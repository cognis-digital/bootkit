# A 5-server (HA) + 4-agent k3s cluster for a disconnected data-center cell.
# Five servers gives etcd a comfortable quorum (tolerates 2 failures). This is
# the "big room" version: a registry seed plus two bootstrap manifests applied
# after the cluster is up.
name: dc-cell-prod
distro: k3s
registry: localhost:5000
token: dc-cell-prod-cluster-token

nodes:
  - {name: cp-1, role: server, ip: 10.20.0.11}
  - {name: cp-2, role: server, ip: 10.20.0.12}
  - {name: cp-3, role: server, ip: 10.20.0.13}
  - {name: cp-4, role: server, ip: 10.20.0.14}
  - {name: cp-5, role: server, ip: 10.20.0.15}
  - {name: node-1, role: agent, ip: 10.20.0.31}
  - {name: node-2, role: agent, ip: 10.20.0.32}
  - {name: node-3, role: agent, ip: 10.20.0.33}
  - {name: node-4, role: agent, ip: 10.20.0.34}

artifacts:
  - {name: k3s-images, type: tarball, path: artifacts/k3s-images.txt}
  - {name: registry-seed, type: registry, path: artifacts/registry.txt}

manifests:
  - bootstrap/cni.yaml
  - bootstrap/ingress.yaml
