# A small cluster used to drive bootkit's MCP server from an AI agent.
name: agent-driven-cluster
distro: rke2
token: agent-driven-cluster-token

nodes:
  - {name: cp-1, role: server, ip: 10.9.0.11}
  - {name: cp-2, role: server, ip: 10.9.0.12}
  - {name: cp-3, role: server, ip: 10.9.0.13}
  - {name: w-1,  role: agent,  ip: 10.9.0.21}

artifacts:
  - {name: images, type: tarball, path: artifacts/images.txt}

manifests:
  - bootstrap/cni.yaml
