# A 3-server (HA) + 2-agent disconnected RKE2 cluster.
name: edge-cluster
distro: rke2
registry: localhost:5000
token: super-secret-cluster-token

nodes:
  - name: cp-1
    role: server
    ip: 10.0.0.11
  - name: cp-2
    role: server
    ip: 10.0.0.12
  - name: cp-3
    role: server
    ip: 10.0.0.13
  - name: worker-1
    role: agent
    ip: 10.0.0.21
  - name: worker-2
    role: agent
    ip: 10.0.0.22

artifacts:
  - name: rke2-install
    type: tarball
    path: artifacts/rke2-images.txt
  - name: registry-seed
    type: registry
    path: artifacts/registry-seed.txt

manifests:
  - bootstrap/cni.yaml
